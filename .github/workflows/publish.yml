name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish (for example v0.1.0-beta.3)
        required: true
        type: string
      ref:
        description: Git ref, branch, or SHA to build. Defaults to the current ref.
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: "--bundles nsis"
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        shell: bash
    env:
      RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        if: runner.os == 'Windows'
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"
      - run: bun install
      - name: Bundle plugins
        run: bun run bundle:plugins
      - name: Verify bundled plugins
        run: |
          COUNT=$(find src-tauri/resources/bundled_plugins -maxdepth 2 -name plugin.json | wc -l | tr -d ' ')
          if [[ "$COUNT" -lt 1 ]]; then
            echo "No bundled plugins found under src-tauri/resources/bundled_plugins."
            exit 1
          fi

      - name: Release preflight
        run: node ./scripts/release-preflight.mjs --release-tag "$RELEASE_TAG"

      - name: Verify updater signing key is configured
        if: runner.os == 'Windows'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [[ -z "$TAURI_SIGNING_PRIVATE_KEY" ]]; then
            echo "Missing TAURI_SIGNING_PRIVATE_KEY secret."
            exit 1
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: ${{ env.RELEASE_TAG }}
          releaseDraft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Verify updater assets uploaded
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSETS=$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' | tr -d '\r')

          printf '%s\n' "$ASSETS" | grep -Fxq 'latest.json' || { echo "Missing updater manifest: latest.json"; exit 1; }
          printf '%s\n' "$ASSETS" | grep -Eq '\.sig$' || { echo "Missing updater signatures (.sig)"; exit 1; }
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            printf '%s\n' "$ASSETS" | grep -Eq 'setup\.exe$' || { echo "Missing Windows setup executable"; exit 1; }
          fi
